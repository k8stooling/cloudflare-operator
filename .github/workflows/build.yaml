name: Publish to ghcr.io
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:   

permissions:
  packages: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/cloudflare-operator
          # This automatically generates tags based on Git tags and commits
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Multi-Arch Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Caching speeds up subsequent builds drastically
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.10.0

      - name: Authenticate with GHCR
        env:
          CR_PAT: ${{ secrets.GITHUB_TOKEN }}  # Default GitHub token
        run: echo "${CR_PAT}" | helm registry login ghcr.io --username ${{ github.actor }} --password-stdin

      - name: Package Helm Chart
        run: |
          cd helm
          helm package . 
          mv *.tgz packaged-chart.tgz

      - name: Push Helm Chart to GHCR
        run: |
          cd helm
          CHART_VERSION=$(helm show chart . | grep 'version:' | awk '{print $2}')
          helm push packaged-chart.tgz oci://ghcr.io/${{ github.repository_owner }}/charts