---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "cloudflare-operator.fullname" . }}-manager
  labels:
    {{- include "cloudflare-operator.labels" . | nindent 4 }}
rules:
  # Base operator rules
  - apiGroups: [""]
    resources: [secrets, pods, pods/exec, pods/log]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: ["apps"]
    resources: [deployments, daemonsets, replicasets, statefulsets]
    verbs: [create, delete, get, list, patch, update, watch]
  # Rules for cloudflare.k8stooling.io/v1alpha1, Kind: AccessApplication
  - apiGroups: ["cloudflare.k8stooling.io"]
    resources: [accessapplications, accessapplications/status, accessapplications/finalizers]
    verbs: [create, delete, get, list, patch, update, watch]
{{- with .Values.extraClusterRoleRules }}
{{ toYaml . | indent 2 }}
{{- end }}
