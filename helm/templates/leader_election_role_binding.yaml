apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "cloudflare-operator.fullname" . }}-leader-election
  labels:
    {{- include "cloudflare-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "cloudflare-operator.fullname" . }}-leader-election
subjects:
  - kind: ServiceAccount
    name: {{ include "cloudflare-operator.serviceAccountName" . }}
    namespace: {{ .Values.serviceAccount.namespace | default .Release.Namespace }}
